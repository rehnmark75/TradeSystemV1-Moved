version: "3.8"

services:
  fastapi-dev:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
      args:
        APP_DIR: dev-app
    container_name: fastapi-dev
    restart: unless-stopped
    volumes:
      - ./dev-app:/app:cached
      - ./logs/dev:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    working_dir: /app
    ports:
      - "8001:8000"
    expose:
      - "8001"
    environment:
      - PORT=8001
      - TRADING_ENVIRONMENT=demo
      - TRADING_CONFIG_SET=demo
      - FASTAPI_SELF_URL=http://fastapi-dev:8000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forex
      - CONFIG_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forex_config
      - IG_API_KEY=${DEMO_API_KEY}
      - IG_PWD=${DEMO_PASSWORD}
      # Telegram notifications
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TRADE_NOTIFICATION_TELEGRAM_ENABLED=${TRADE_NOTIFICATION_TELEGRAM_ENABLED:-false}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
    healthcheck:
      disable: true  # Health endpoint always times out - container is functional, disable healthcheck
    networks:
      - lab-net
      - workers-demo
    depends_on:
      - postgres

  fastapi-live:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
      args:
        APP_DIR: dev-app
    container_name: fastapi-live
    restart: unless-stopped
    volumes:
      - ./dev-app:/app:cached
      - ./logs/live:/app/logs
    working_dir: /app
    ports:
      - "8002:8000"
    expose:
      - "8002"
    environment:
      - PORT=8002
      - TRADING_ENVIRONMENT=live
      - TRADING_CONFIG_SET=live
      - FASTAPI_SELF_URL=http://fastapi-live:8000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forex
      - CONFIG_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forex_config
      - IG_API_KEY=${PROD_API_KEY}
      - IG_PWD=${PROD_PASSWORD}
      - IG_LIVE_ACCOUNT_ID=RU5AS
      # Internal API auth (required for write endpoints like position-closer)
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
      # Telegram notifications
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TRADE_NOTIFICATION_TELEGRAM_ENABLED=${TRADE_NOTIFICATION_TELEGRAM_ENABLED:-true}
    healthcheck:
      disable: true
    networks:
      - lab-net
      - workers-live
    depends_on:
      - postgres
  fastapi-stream:
    build:
      context: .
      dockerfile: Dockerfile.fastapistream
      args:
        APP_DIR: stream-app
    container_name: fastapi-stream
    restart: unless-stopped
    volumes:
      - ./stream-app:/app:cached
      - ./logs/stream:/app/logs

    ports:
      - "8003:8000"  
    expose:
      - "8003"
    environment:
      - PORT=8003
      - IG_API_KEY=${PROD_API_KEY}
      - IG_PWD=${PROD_PASSWORD}
    networks:
      - lab-net

  nginx:
    build: ./nginx
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./certs:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./nginx/nginx.https.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "4443:4443"
      - "4446:4446"
      - "8080:8080"
    command: /bin/sh -c "sleep 5 && nginx -g 'daemon off;'"
    depends_on:
      - fastapi-dev
      - fastapi-live
      - pgadmin
    networks:
      - lab-net

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certs:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "certbot certonly --webroot -w /var/www/certbot
      --email your@email.com --agree-tos --no-eff-email
      -d trader.nordicbynature.se"
    networks:
      - lab-net

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: forex
    ports:
      - "5432:5432"
    volumes:
      - ./postgres:/var/lib/postgresql/data
    networks:
      - lab-net
      - workers-demo
      - workers-live

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"    # API
      - "9001:9001"    # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - lab-net
      - workers-demo
      - workers-live
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  trading-ui:
    build:
      context: ./trading-ui
      dockerfile: Dockerfile
    container_name: trading-ui
    restart: unless-stopped
    ports:
      - "3010:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forex
      - STOCKS_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/stocks
      - STRATEGY_CONFIG_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/strategy_config
      - FASTAPI_GENERAL_URL=http://fastapi-general:8008
      - FASTAPI_DEV_URL=http://fastapi-dev:8000
      - FASTAPI_API_KEY=${FASTAPI_API_KEY}
      - SYSTEM_MONITOR_URL=http://system-monitor:8095
      - FASTAPI_STREAM_URL=http://fastapi-stream:8000
      - NEXT_PUBLIC_BASE_PATH=/trading
      - ROBOMARKETS_API_KEY=${ROBOMARKETS_API_KEY:-28e2c0dab20ac9f6fd54917100be3c9b8d1c650cde5205b8b79c6c795b6fc676}
      - ROBOMARKETS_ACCOUNT_ID=${ROBOMARKETS_ACCOUNT_ID:-93121868}
      - ROBOMARKETS_API_URL=${ROBOMARKETS_API_URL:-https://api.stockstrader.com/api/v1}
    volumes:
      - ./logs:/app/system-logs:ro
    networks:
      - lab-net
    depends_on:
      - postgres

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
    container_name: oauth2-proxy
    restart: unless-stopped
    environment:
      - OAUTH2_PROXY_PROVIDER=google
      - OAUTH2_PROXY_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - OAUTH2_PROXY_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET}
      - OAUTH2_PROXY_COOKIE_SECURE=true
      - OAUTH2_PROXY_COOKIE_SAMESITE=lax
      - OAUTH2_PROXY_REVERSE_PROXY=true
      - OAUTH2_PROXY_REDIRECT_URL=https://klirr.i234.me:4446/oauth2/callback
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE=/etc/oauth2-proxy/allowed-emails.txt
      - OAUTH2_PROXY_SET_XAUTHREQUEST=true
      - OAUTH2_PROXY_PASS_ACCESS_TOKEN=false
      - OAUTH2_PROXY_SKIP_PROVIDER_BUTTON=true
      - OAUTH2_PROXY_WHITELIST_DOMAINS=klirr.i234.me,trader.nordicbynature.se
      - OAUTH2_PROXY_COOKIE_DOMAINS=klirr.i234.me,trader.nordicbynature.se
    volumes:
      - ./nginx/oauth2/allowed-emails.txt:/etc/oauth2-proxy/allowed-emails.txt:ro
    networks:
      - lab-net

  fastapi-general:
    build:
      context: .
      dockerfile: fastapi-general/Dockerfile
    container_name: fastapi-general
    restart: unless-stopped
    ports:
      - "8008:8008"
    environment:
      - STOCKS_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/stocks
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
    networks:
      - lab-net
    depends_on:
      - postgres

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 4445
      PGADMIN_ENABLE_TLS: "True"
      PGADMIN_TLS_CERT: /certs/server.cert
      PGADMIN_TLS_KEY: /certs/server.key
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "4445:4445"
    volumes:
      - ./pgadmin/certs/server.cert:/certs/server.cert:ro
      - ./pgadmin/certs/server.key:/certs/server.key:ro
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - ./pgadmin/pgadmin4.key:/pgadmin4/pgadmin4.key
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - lab-net
  streamlit:
    build:
      context: ./streamlit
    container_name: streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forex
      - CONFIG_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forex_config
      - STRATEGY_CONFIG_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/strategy_config
      - SYSTEM_MONITOR_URL=http://system-monitor:8095
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-d4thb4pr01qnn6lkv89gd4thb4pr01qnn6lkv8a0}
      - ROBOMARKETS_API_KEY=${ROBOMARKETS_API_KEY:-28e2c0dab20ac9f6fd54917100be3c9b8d1c650cde5205b8b79c6c795b6fc676}
      - ROBOMARKETS_ACCOUNT_ID=${ROBOMARKETS_ACCOUNT_ID:-93121868}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - MINIO_BUCKET_NAME=claude-charts
      - MINIO_PUBLIC_URL=http://localhost:9000
    volumes:
      - ./streamlit:/app:cached
      - ./logs:/logs:ro  # Read-only for safety
      - ./worker/app/claude_analysis_enhanced:/app/claude_analysis_enhanced:ro  # Vision analysis charts (fallback)
      - ./worker/app/forex_scanner:/app/forex_scanner:ro  # Strategy config files
      - ./dev-app/config.py:/app/trailing_config.py:ro  # Trailing stop config (source of truth from fastapi-dev)
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Docker socket for running backtests (read-only)
    working_dir: /app
    networks:
      - lab-net
    depends_on:
      - fastapi-dev
      - fastapi-live
      - minio
      - task-worker

  task-worker:
    build:
      context: ./worker
    container_name: task-worker
    restart: unless-stopped
    volumes:
      - ./worker/app:/app
      - ./logs/worker:/app/logs
      - ./dev-app/config.py:/app/trailing_config_live.py:ro
    environment:
      - PYTHONPATH=/app
      - TRADING_ENVIRONMENT=demo
      - TRADING_CONFIG_SET=demo
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forex
      - CONFIG_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forex_config
      - STOCKS_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/stocks
      - STRATEGY_CONFIG_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/strategy_config
      - ORDER_API_URL=http://fastapi-dev:8000/orders/place-order
      - API_SUBSCRIPTION_KEY=${API_SUBSCRIPTION_KEY}
      - IG_API_KEY=${DEMO_API_KEY}
      - IG_PWD=${DEMO_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ROBOMARKETS_API_KEY=${ROBOMARKETS_API_KEY:-28e2c0dab20ac9f6fd54917100be3c9b8d1c650cde5205b8b79c6c795b6fc676}
      - ROBOMARKETS_ACCOUNT_ID=${ROBOMARKETS_ACCOUNT_ID:-93121868}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-d4thb4pr01qnn6lkv89gd4thb4pr01qnn6lkv8a0}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - MINIO_BUCKET_NAME=claude-charts
      - SCAN_OFFSET_SECONDS=0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - ORDER_FAILURE_TELEGRAM_ENABLED=${ORDER_FAILURE_TELEGRAM_ENABLED:-true}
    networks:
      - workers-demo
      - lab-net
    depends_on:
      - postgres
      - fastapi-dev
      - minio

  task-worker-live:
    build:
      context: ./worker
    container_name: task-worker-live
    restart: unless-stopped
    volumes:
      - ./worker/app:/app
      - ./logs/worker-live:/app/logs
    environment:
      - TRADING_ENVIRONMENT=live
      - TRADING_CONFIG_SET=live
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forex
      - CONFIG_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forex_config
      - STOCKS_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/stocks
      - STRATEGY_CONFIG_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/strategy_config
      - ORDER_API_URL=http://fastapi-live:8000/orders/place-order
      - API_SUBSCRIPTION_KEY=${API_SUBSCRIPTION_KEY}
      - IG_API_KEY=${PROD_API_KEY}
      - IG_PWD=${PROD_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY_LIVE}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - MINIO_BUCKET_NAME=claude-charts
      - SCAN_OFFSET_SECONDS=60
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - ORDER_FAILURE_TELEGRAM_ENABLED=${ORDER_FAILURE_TELEGRAM_ENABLED:-true}
    networks:
      - workers-live
      - lab-net
    depends_on:
      - postgres
      - fastapi-live
      - minio

  stock-scanner:
    build:
      context: ./stock-scanner
      dockerfile: Dockerfile
    container_name: stock-scanner
    restart: unless-stopped
    volumes:
      - ./stock-scanner/app:/app
      - ./logs/stock-scanner:/app/stock_scanner/logs
    environment:
      - STOCKS_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/stocks
      - ROBOMARKETS_API_KEY=${ROBOMARKETS_API_KEY:-28e2c0dab20ac9f6fd54917100be3c9b8d1c650cde5205b8b79c6c795b6fc676}
      - ROBOMARKETS_ACCOUNT_ID=${ROBOMARKETS_ACCOUNT_ID:-93121868}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-d4thb4pr01qnn6lkv89gd4thb4pr01qnn6lkv8a0}
      - PREMARKET_PRICING_TICKER_LIMIT=100
      - PREMARKET_PRICING_NEWS_LIMIT=25
      - PREMARKET_PRICING_LATE_TICKER_LIMIT=50
      - PREMARKET_PRICING_LATE_NEWS_LIMIT=10
      - TRADING_UI_URL=http://trading-ui:3000/trading
    command: ["python", "-m", "stock_scanner.scheduler", "run"]
    networks:
      - lab-net
    depends_on:
      - postgres

  stock-breakeven-monitor:
    build:
      context: ./stock-scanner
      dockerfile: Dockerfile
    container_name: stock-breakeven-monitor
    restart: unless-stopped
    volumes:
      - ./stock-scanner/app:/app
      - ./logs/stock-scanner:/app/stock_scanner/logs
    environment:
      - STOCKS_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/stocks
      - ROBOMARKETS_API_KEY=${ROBOMARKETS_API_KEY:-28e2c0dab20ac9f6fd54917100be3c9b8d1c650cde5205b8b79c6c795b6fc676}
      - ROBOMARKETS_ACCOUNT_ID=${ROBOMARKETS_ACCOUNT_ID:-93121868}
      - BREAKEVEN_MONITOR_DRY_RUN=${BREAKEVEN_MONITOR_DRY_RUN:-false}
      - BREAKEVEN_MONITOR_INTERVAL_SECONDS=${BREAKEVEN_MONITOR_INTERVAL_SECONDS:-300}
    command: ["python", "-m", "stock_scanner.scheduler", "breakeven-monitor"]
    networks:
      - lab-net
    depends_on:
      - postgres

  stock-auto-trader:
    build:
      context: ./stock-scanner
      dockerfile: Dockerfile
    container_name: stock-auto-trader
    restart: unless-stopped
    volumes:
      - ./stock-scanner/app:/app
      - ./logs/stock-scanner:/app/stock_scanner/logs
    environment:
      - STOCKS_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/stocks
      - TRADING_UI_URL=http://trading-ui:3000/trading
      - ROBOMARKETS_API_KEY=${ROBOMARKETS_API_KEY:-28e2c0dab20ac9f6fd54917100be3c9b8d1c650cde5205b8b79c6c795b6fc676}
      - ROBOMARKETS_ACCOUNT_ID=${ROBOMARKETS_ACCOUNT_ID:-93121868}
      - AUTO_TRADING_ENABLED=true
      - AUTO_TRADING_DRY_RUN=false
      - AUTO_TRADER_INTERVAL_SECONDS=60
      - AUTO_TRADE_VALIDATE_DELAY_MINUTES=5
      - AUTO_TRADE_START_DELAY_MINUTES=15
      - AUTO_TRADE_STOP_AFTER_MINUTES=45
      - MAX_ORDER_NOTIONAL_USD=500
      - MAX_ACTIVE_STOCK_ORDERS=5
      - MAX_ORDERS_PER_RUN=5
      - AUTO_TRADE_MAX_SPREAD_PCT=0.4
      - AUTO_TRADE_MIN_SCORE=65
      - AUTO_TRADE_MIN_RELATIVE_VOLUME=0
      - AUTO_TRADE_REQUIRE_INTRADAY_RVOL=false
      - AUTO_TRADE_MAX_QUOTE_AGE_MINUTES=3
      - AUTO_TRADE_PULLBACK_LIMIT_OFFSET_PCT=0.3
      - AUTO_TRADE_STOP_LOSS_PCT=3.0
      - AUTO_TRADE_TAKE_PROFIT_PCT=5.0
      - AUTO_TRADE_MAX_STOP_DISTANCE_PCT=3.0
      - AUTO_TRADE_MAX_RISK_PCT=3.0
      - AUTO_TRADE_MAX_RISK_USD=15.0
    command: ["python", "-m", "stock_scanner.scheduler", "autotrader-monitor"]
    networks:
      - lab-net
    depends_on:
      - postgres
      - trading-ui

  stock-intraday-vwap:
    build:
      context: ./stock-scanner
      dockerfile: Dockerfile
    container_name: stock-intraday-vwap
    restart: unless-stopped
    volumes:
      - ./stock-scanner/app:/app
      - ./logs/stock-scanner:/app/stock_scanner/logs
    environment:
      - STOCKS_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/stocks
      - TRADING_UI_URL=http://trading-ui:3000/trading
      - INTRADAY_VWAP_ENABLED=true
      - INTRADAY_VWAP_POOL_LIMIT=50
      - INTRADAY_VWAP_START_BEFORE_OPEN_MIN=5
      - INTRADAY_VWAP_STOP_AFTER_OPEN_MIN=60
      - INTRADAY_VWAP_INTERVAL_SECONDS=150
    command: ["python", "-m", "stock_scanner.scheduler", "intraday-vwap"]
    networks:
      - lab-net
    depends_on:
      - postgres
      - trading-ui

  economic-calendar:
    build:
      context: ./economic-calendar
    container_name: economic-calendar
    restart: unless-stopped
    ports:
      - "8091:8091"
    volumes:
      - ./economic-calendar/app:/app
      - ./logs/economic-calendar:/app/logs
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forex
      - CONFIG_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forex_config
      - PORT=8091
      - PYTHONPATH=/app
    networks:
      - lab-net
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  system-monitor:
    build:
      context: ./system-monitor
    container_name: system-monitor
    restart: unless-stopped
    ports:
      - "8095:8095"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs/system-monitor:/app/logs
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/forex
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_ENABLED=true
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - EMAIL_ENABLED=false
      - MONITOR_INTERVAL=30
      - ALERT_COOLDOWN=900
    networks:
      - lab-net
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8095/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db-backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    image: db-backup:latest
    container_name: db-backup
    restart: unless-stopped
    environment:
      - BACKUP_SCHEDULE=0 2 * * *  # Daily at 2 AM
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      # Azure Blob Storage configuration
      - AZURE_STORAGE_ACCOUNT=klirrbackup
      - AZURE_STORAGE_KEY=${AZURE_STORAGE_KEY}
      - AZURE_STORAGE_CONTAINER=klirrbackup
      - AZURE_RETENTION_DAYS=60
    volumes:
      - ./scripts:/scripts:ro
      - ./logs:/app/logs:ro
      - ./vector-db:/app/vector-db:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - lab-net
    depends_on:
      - postgres
    command: >
      sh -c "
        while true; do
          echo 'Running scheduled Azure backup...' &&
          /scripts/azure_backup.sh &&
          echo 'Azure backup completed. Sleeping for 24 hours...' &&
          sleep 86400
        done
      "
    healthcheck:
      test: ["CMD-SHELL", "which az && test -f /scripts/azure_backup.sh"]
      interval: 6h
      timeout: 30s
      retries: 2
      start_period: 30s

volumes:
  pgadmin_data:
  minio_data:

networks:
  lab-net:
  workers-demo:
    internal: true
  workers-live:
    internal: true
